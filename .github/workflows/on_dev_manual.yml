name: Manual dispatch

on:
  workflow_dispatch:

jobs:
  build-and-deploy-manual:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEV_BUCKET: aiuta_dev_static
      DEV_URL: https://static.dev.aiuta.com
      PREPROD_BUCKET: aiuta_preprod_static
      PREPROD_URL: https://static.preprod.aiuta.com
      PROD_BUCKET: aiuta_prod_static
      PROD_URL: https://static.aiuta.com
      DEPLOY_PATH: sdk/${{ github.ref_name }}/

    steps:
      - name: 🛡️ Refuse refs that collide with release paths
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Manual deploys write to sdk/<ref>/ in the prod bucket, so a ref
          # named like a release artifact would overwrite the real release:
          # "latest", a (potential) version number like 1.2.3 / v1.2.3, or a
          # major alias like v1. The first path segment decides the prefix the
          # deploy writes into, so it's checked for refs with slashes too.
          FIRST_SEGMENT="${REF_NAME%%/*}"
          if [[ "$FIRST_SEGMENT" == "latest" || "$FIRST_SEGMENT" =~ ^v?[0-9]+(\.[0-9]+)*$ ]]; then
            echo "::error::Ref '$REF_NAME' would deploy into 'sdk/$FIRST_SEGMENT/', which is reserved for release artifacts (latest, vX.Y.Z or the vX major alias). Rename the branch to deploy it manually."
            exit 1
          fi
          echo "✅ Ref '$REF_NAME' is safe to deploy to sdk/$REF_NAME/"

      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup project environment
        uses: ./.github/actions/setup-project

      - name: 📦 Build dev project
        run: npm run build:dev
        env:
          AIUTA_APP_PATH: ${{ env.DEPLOY_PATH }}

      - name: 🚀 Deploy to Dev
        uses: ./.github/actions/deploy-to-gcs
        with:
          credentials_json: ${{ secrets.GCP_STATIC_UPLOADER_SA_KEY_JSON_DEV }}
          bucket_name: ${{ env.DEV_BUCKET }}
          destination_path: ${{ env.DEPLOY_PATH }}

      - name: 📦 Build preprod project
        run: npm run build:preprod
        env:
          AIUTA_APP_PATH: ${{ env.DEPLOY_PATH }}

      - name: 🚀 Deploy to Preprod
        uses: ./.github/actions/deploy-to-gcs
        with:
          credentials_json: ${{ secrets.GCP_STATIC_UPLOADER_SA_KEY_JSON_PREPROD }}
          bucket_name: ${{ env.PREPROD_BUCKET }}
          destination_path: ${{ env.DEPLOY_PATH }}

      - name: 📦 Build prod project
        run: npm run build
        env:
          AIUTA_APP_PATH: ${{ env.DEPLOY_PATH }}

      - name: 🚀 Deploy to Prod
        uses: ./.github/actions/deploy-to-gcs
        with:
          credentials_json: ${{ secrets.GCP_STATIC_UPLOADER_SA_KEY_JSON_PROD }}
          bucket_name: ${{ env.PROD_BUCKET }}
          destination_path: ${{ env.DEPLOY_PATH }}

      - name: 📋 Deployment Summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "📦 Branch: ${{ github.ref_name }}"
          echo "📁 Dev uploaded to: ${{ env.DEV_BUCKET }}/${{ env.DEPLOY_PATH }}"
          echo "📁 Preprod uploaded to: ${{ env.PREPROD_BUCKET }}/${{ env.DEPLOY_PATH }}"
          echo "📁 Prod uploaded to: ${{ env.PROD_BUCKET }}/${{ env.DEPLOY_PATH }}"
          echo ""
          echo "🔗 Files available at:"
          echo ""
          echo "Dev:"
          for file in dist/sdk/*; do
            filename=$(basename "$file")
            echo "- ${{ env.DEV_URL }}/${{ env.DEPLOY_PATH }}${filename}"
          done
          echo ""
          echo "Preprod:"
          for file in dist/sdk/*; do
            filename=$(basename "$file")
            echo "- ${{ env.PREPROD_URL }}/${{ env.DEPLOY_PATH }}${filename}"
          done
          echo ""
          echo "Prod:"
          for file in dist/sdk/*; do
            filename=$(basename "$file")
            echo "- ${{ env.PROD_URL }}/${{ env.DEPLOY_PATH }}${filename}"
          done
